services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    env_file:
      - .env
volumes:
  postgres_data:
